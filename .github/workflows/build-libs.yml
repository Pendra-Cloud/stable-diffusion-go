name: Build native libs

# Compiles leejet/stable-diffusion.cpp (pinned by lib/version.txt) into the
# shared libraries this Go binding dlopens, for every (os, arch, processor)
# variant, and publishes them as per-variant release archives. There is no
# upstream prebuilt release covering these variants, so we build them here.
#
# Design (see also lib/version.txt and pkg/sd/load.go):
#   * SD_BUILD_SHARED_LIBS=ON with the default SD_BUILD_SHARED_GGML_LIB=OFF
#     yields ONE self-contained libstable-diffusion with ggml statically
#     embedded — there is no standalone libggml-base, so it never collides with
#     another in-process ggml-bearing library at load time.
#   * Hidden visibility exports only the SD_API-marked sd_* symbols and keeps
#     ggml_* local. A fail-closed symbol gate asserts all expected symbols are
#     present AND no ggml symbol leaked, before anything is published.
#
# Trigger: manual (workflow_dispatch) or pushing a `libs-*` tag.

on:
  workflow_dispatch:
    inputs:
      only:
        description: "Limit to one variant id for a gating run (e.g. linux-amd64-cpu). Empty = full matrix."
        required: false
        default: ""
  push:
    tags:
      - "libs-*"

permissions:
  contents: write

env:
  SD_UPSTREAM: leejet/stable-diffusion.cpp
  # CUDA toolkit version for the CUDA variants. The Turing→Blackwell arch list
  # below is valid for CUDA 13 (Pascal/Volta sm_61/sm_70 are dropped there). The
  # Linux CUDA build runs inside the matching nvidia/cuda devel image (set in the
  # matrix); Windows installs this version via the Jimver action.
  CUDA_WINDOWS_VERSION: "13.0.0"
  CUDA_ARCHS: "75;80;86;89;90;100;120"
  VULKAN_SDK_VERSION: "1.4.328.1"
  # Shared base flags for every variant. Hidden visibility + static ggml is the
  # isolation mechanism; SD_API (default visibility) re-exports only sd_*.
  SD_BASE_FLAGS: >-
    -DCMAKE_BUILD_TYPE=Release
    -DSD_BUILD_SHARED_LIBS=ON
    -DSD_BUILD_SHARED_GGML_LIB=OFF
    -DSD_BUILD_EXAMPLES=OFF
    -DGGML_BACKEND_DL=OFF
    -DCMAKE_C_VISIBILITY_PRESET=hidden
    -DCMAKE_CXX_VISIBILITY_PRESET=hidden
    -DCMAKE_CUDA_VISIBILITY_PRESET=hidden
    -DCMAKE_VISIBILITY_INLINES_HIDDEN=ON

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      commit: ${{ steps.v.outputs.commit }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < lib/version.txt)"
          commit="${version##*-}"   # last dash-separated segment, e.g. 4ff2c8c
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "commit=$commit"   >> "$GITHUB_OUTPUT"
          echo "tag=libs-$version" >> "$GITHUB_OUTPUT"
          echo "Building upstream $SD_UPSTREAM @ $commit (pin: $version)"

  # ---------------------------------------------------------------------------
  # Linux — one self-contained .so per (arch, processor). The binding's Unix
  # loader opens a single libstable-diffusion.so from the lib dir (no per-CPU
  # subdir selection — that's Windows-only), so the Linux CPU build targets an
  # AVX2 baseline (ubiquitous on x86-64 servers); arm64 uses NEON defaults.
  # ---------------------------------------------------------------------------
  linux:
    needs: version
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-amd64-cpu
            runner: ubuntu-22.04
            arch: amd64
            proc: cpu
            flags: "-DGGML_NATIVE=OFF -DGGML_AVX2=ON"
          - id: linux-amd64-vulkan
            runner: ubuntu-22.04
            arch: amd64
            proc: vulkan
            flags: "-DSD_VULKAN=ON -DGGML_NATIVE=OFF -DGGML_AVX2=ON"
          - id: linux-amd64-cuda
            runner: ubuntu-22.04
            container: nvidia/cuda:13.0.0-devel-ubuntu22.04
            arch: amd64
            proc: cuda
            flags: "-DSD_CUDA=ON -DGGML_NATIVE=OFF -DGGML_AVX2=ON"
          - id: linux-arm64-cpu
            runner: ubuntu-22.04-arm
            arch: arm64
            proc: cpu
            flags: "-DGGML_NATIVE=OFF"
    steps:
      - uses: actions/checkout@v4

      - name: Install build tooling
        run: |
          set -euo pipefail
          if command -v apt-get >/dev/null; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends \
              build-essential cmake ninja-build git ca-certificates curl
          fi

      - name: Install Vulkan SDK
        if: matrix.proc == 'vulkan'
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends wget gnupg ca-certificates
          # The ggml Vulkan backend compiles shaders at build time with glslc,
          # which ships in the LunarG SDK (not in Ubuntu's libvulkan-dev). Pull
          # it from LunarG's apt repo (jammy = 22.04).
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | tee /etc/apt/trusted.gpg.d/lunarg.asc >/dev/null
          wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          apt-get update
          apt-get install -y --no-install-recommends vulkan-sdk

      - name: Clone upstream stable-diffusion.cpp @ pinned commit
        run: scripts/clone-upstream.sh "https://github.com/${SD_UPSTREAM}.git" "${{ needs.version.outputs.commit }}" upstream

      - name: Configure & build
        working-directory: upstream
        run: |
          set -euo pipefail
          cmake -S . -B build -G Ninja $SD_BASE_FLAGS \
            -DCMAKE_CUDA_ARCHITECTURES="${CUDA_ARCHS}" \
            ${{ matrix.flags }}
          cmake --build build --config Release -j

      - name: Locate library
        id: lib
        run: |
          set -euo pipefail
          so="$(find upstream/build -name 'libstable-diffusion.so' -print -quit)"
          test -n "$so" || { echo "libstable-diffusion.so not found"; find upstream/build -name '*.so' | sed 's/^/  found: /'; exit 1; }
          echo "path=$so" >> "$GITHUB_OUTPUT"

      - name: Verify exported symbols (fail-closed)
        run: scripts/check-symbols.sh "${{ steps.lib.outputs.path }}" lib/expected-symbols.txt

      - name: Package archive
        run: |
          set -euo pipefail
          ver="${{ needs.version.outputs.version }}"
          stage="stage"
          mkdir -p "$stage"
          cp "${{ steps.lib.outputs.path }}" "$stage/"
          cp lib/stable-diffusion.cpp.txt lib/ggml.txt "$stage/" 2>/dev/null || true
          name="stable-diffusion-libs-linux-${{ matrix.arch }}-${{ matrix.proc }}-${ver}.tar.gz"
          tar -C "$stage" -czf "$name" .
          echo "Packaged $name"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.id }}
          path: stable-diffusion-libs-*.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # macOS — Apple Silicon, Metal. Self-contained dylib (ggml static).
  # ---------------------------------------------------------------------------
  macos:
    needs: version
    if: ${{ github.event.inputs.only == '' || startsWith(github.event.inputs.only, 'darwin') }}
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install build tooling
        run: brew install cmake ninja
      - name: Clone upstream stable-diffusion.cpp @ pinned commit
        run: scripts/clone-upstream.sh "https://github.com/${SD_UPSTREAM}.git" "${{ needs.version.outputs.commit }}" upstream
      - name: Configure & build
        working-directory: upstream
        run: |
          set -euo pipefail
          cmake -S . -B build -G Ninja $SD_BASE_FLAGS -DSD_METAL=ON
          cmake --build build --config Release -j
      - name: Locate library
        id: lib
        run: |
          set -euo pipefail
          dylib="$(find upstream/build -name 'libstable-diffusion.dylib' -print -quit)"
          test -n "$dylib" || { echo "libstable-diffusion.dylib not found"; find upstream/build -name '*.dylib' | sed 's/^/  found: /'; exit 1; }
          echo "path=$dylib" >> "$GITHUB_OUTPUT"
      - name: Verify exported symbols (fail-closed)
        run: scripts/check-symbols.sh "${{ steps.lib.outputs.path }}" lib/expected-symbols.txt
      - name: Package archive
        run: |
          set -euo pipefail
          ver="${{ needs.version.outputs.version }}"
          stage="stage"; mkdir -p "$stage"
          cp "${{ steps.lib.outputs.path }}" "$stage/"
          cp lib/stable-diffusion.cpp.txt lib/ggml.txt "$stage/" 2>/dev/null || true
          name="stable-diffusion-libs-darwin-arm64-metal-${ver}.tar.gz"
          tar -C "$stage" -czf "$name" .
          echo "Packaged $name"
      - uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64-metal
          path: stable-diffusion-libs-*.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows — the binding selects a per-variant SUBDIR within the lib dir
  # (avx512/ avx2/ avx/ noavx/ for CPU, cuda12/ vulkan/ for GPU; see
  # windowsLibCandidates in pkg/sd/load.go). So we build every variant and ship
  # ONE archive carrying that subdir tree; a single lib dir then satisfies any
  # host.
  # ---------------------------------------------------------------------------
  windows:
    needs: version
    if: ${{ github.event.inputs.only == '' || startsWith(github.event.inputs.only, 'windows') }}
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Install Vulkan SDK
        run: |
          $ErrorActionPreference = "Stop"
          $url = "https://sdk.lunarg.com/sdk/download/$env:VULKAN_SDK_VERSION/windows/VulkanSDK-$env:VULKAN_SDK_VERSION-Installer.exe"
          Invoke-WebRequest -Uri $url -OutFile vulkan-installer.exe
          Start-Process -FilePath .\vulkan-installer.exe -ArgumentList "--accept-licenses","--default-answer","--confirm-command","install" -Wait
          "VULKAN_SDK=C:\VulkanSDK\$env:VULKAN_SDK_VERSION" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.27
        id: cuda
        with:
          cuda: ${{ env.CUDA_WINDOWS_VERSION }}
          method: network
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "cuda_profiler_api"]'

      - name: Clone upstream stable-diffusion.cpp @ pinned commit
        run: |
          $ErrorActionPreference = "Stop"
          bash scripts/clone-upstream.sh "https://github.com/$env:SD_UPSTREAM.git" "${{ needs.version.outputs.commit }}" upstream

      - name: Build all Windows variants
        run: |
          $ErrorActionPreference = "Stop"
          $base = $env:SD_BASE_FLAGS -replace "`n"," "
          # subdir name (what the binding looks for) => extra cmake flags
          $variants = [ordered]@{
            "avx2"    = "-DGGML_NATIVE=OFF -DGGML_AVX2=ON";
            "avx512"  = "-DGGML_NATIVE=OFF -DGGML_AVX512=ON -DGGML_AVX=ON -DGGML_AVX2=ON";
            "avx"     = "-DGGML_NATIVE=OFF -DGGML_AVX=ON -DGGML_AVX2=OFF";
            "noavx"   = "-DGGML_NATIVE=OFF -DGGML_AVX=OFF -DGGML_AVX2=OFF -DGGML_FMA=OFF";
            "vulkan"  = "-DSD_VULKAN=ON -DGGML_NATIVE=OFF -DGGML_AVX2=ON";
            "cuda12"  = "-DSD_CUDA=ON -DGGML_NATIVE=OFF -DGGML_AVX2=ON";
          }
          New-Item -ItemType Directory -Force -Path stage | Out-Null
          foreach ($name in $variants.Keys) {
            Write-Host "::group::build $name"
            $bdir = "upstream/build-$name"
            $extra = $variants[$name]
            $cfg = "cmake -S upstream -B $bdir -G Ninja $base -DCMAKE_CUDA_ARCHITECTURES=`"$env:CUDA_ARCHS`" $extra"
            Write-Host $cfg
            iex $cfg
            cmake --build $bdir --config Release -j
            $dll = Get-ChildItem -Path $bdir -Recurse -Filter "stable-diffusion.dll" | Select-Object -First 1
            if (-not $dll) { throw "stable-diffusion.dll not found for $name" }
            New-Item -ItemType Directory -Force -Path "stage/$name" | Out-Null
            Copy-Item $dll.FullName "stage/$name/"
            Write-Host "::endgroup::"
          }

      - name: Verify exported symbols (fail-closed)
        run: |
          $ErrorActionPreference = "Stop"
          $expected = Get-Content lib/expected-symbols.txt | Where-Object { $_.Trim() -ne "" } | ForEach-Object { $_.Trim() }
          $fail = $false
          Get-ChildItem -Path stage -Recurse -Filter "stable-diffusion.dll" | ForEach-Object {
            $dll = $_.FullName
            Write-Host "Checking $dll"
            $dump = & dumpbin /EXPORTS $dll
            $exports = $dump | Select-String -Pattern '^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+(\S+)' | ForEach-Object { $_.Matches[0].Groups[1].Value }
            foreach ($sym in $expected) {
              if ($exports -notcontains $sym) { Write-Host "MISSING export: $sym in $dll"; $fail = $true }
            }
            $leaked = $exports | Where-Object { $_ -like 'ggml_*' }
            if ($leaked) { Write-Host "LEAKED ggml symbols in $dll:"; $leaked | ForEach-Object { Write-Host "  $_" }; $fail = $true }
          }
          if ($fail) { throw "Windows symbol verification FAILED" }
          Write-Host "Windows symbol verification OK"

      - name: Package archive
        run: |
          $ErrorActionPreference = "Stop"
          $ver = "${{ needs.version.outputs.version }}"
          Copy-Item lib/stable-diffusion.cpp.txt,lib/ggml.txt stage/ -ErrorAction SilentlyContinue
          $name = "stable-diffusion-libs-windows-amd64-$ver.tar.gz"
          tar -C stage -czf $name .
          Write-Host "Packaged $name"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: stable-diffusion-libs-*.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Release — gather every archive, write checksums, attach to the GitHub
  # Release tagged with the pin. Idempotent so re-running a dispatch refreshes
  # the assets in place.
  # ---------------------------------------------------------------------------
  release:
    needs: [version, linux, macos, windows]
    if: ${{ always() && github.event.inputs.only == '' && needs.linux.result == 'success' && needs.macos.result == 'success' && needs.windows.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        working-directory: dist
        run: |
          set -euo pipefail
          ls -la
          sha256sum stable-diffusion-libs-*.tar.gz > checksums.txt
          cat checksums.txt
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
          COMMIT: ${{ needs.version.outputs.commit }}
        run: |
          set -euo pipefail
          notes="Prebuilt stable-diffusion.cpp native libraries for ${SD_UPSTREAM} @ ${COMMIT} (pin: ${VERSION}).

          Built by .github/workflows/build-libs.yml. Each archive contains a
          self-contained libstable-diffusion (ggml statically linked, hidden
          visibility — exports only the sd_* symbols pkg/sd/load.go registers).

          CUDA archives require the host CUDA ${CUDA_WINDOWS_VERSION%%.*} runtime;
          Vulkan archives require a Vulkan loader/ICD on the host. The Windows
          archive carries the per-CPU/GPU subdir tree the binding selects from."
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/stable-diffusion-libs-*.tar.gz dist/checksums.txt --clobber
          else
            gh release create "$TAG" dist/stable-diffusion-libs-*.tar.gz dist/checksums.txt \
              --title "$TAG" --notes "$notes"
          fi

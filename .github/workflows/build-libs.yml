name: Release

# Compiles leejet/stable-diffusion.cpp (pinned by lib/version.txt) into the
# shared libraries this Go binding dlopens, for every (os, arch, processor)
# variant, and publishes them as per-variant release archives. There is no
# upstream prebuilt release covering these variants, so we build them here.
#
# Design (see also lib/version.txt and pkg/sd/load.go):
#   * SD_BUILD_SHARED_LIBS=ON with the default SD_BUILD_SHARED_GGML_LIB=OFF
#     yields ONE self-contained libstable-diffusion with ggml statically
#     embedded — there is no standalone libggml-base, so it never collides with
#     another in-process ggml-bearing library at load time.
#   * Hidden visibility exports only the SD_API-marked sd_* symbols and keeps
#     ggml_* local. A fail-closed symbol gate asserts all expected symbols are
#     present AND no ggml symbol leaked, before anything is published.
#
# This is the repo's SINGLE release pipeline: every merge to main builds the
# full lib matrix and publishes ONE semver release (vX.Y.Z) carrying both the
# tag (so `go get ...@vX.Y.Z` resolves the binding) AND the prebuilt lib
# archives + checksums as assets. There is no separate libs-<pin> train — the
# upstream pin in lib/version.txt selects WHAT is built; the release is named by
# the binding's own semantic version.
#
# Triggers:
#   * push to main — the routine path: the setup job computes the next semver
#     (bump from PR labels / commit message, like the old release.yml), the full
#     matrix builds, and the release job creates the vX.Y.Z tag + release with
#     the libs attached. Skipped per-merge with the "release:skip" label or
#     "[skip release]" / "#norelease" in the merge commit (no build, no release).
#   * workflow_dispatch — manual test run; the `only` input limits it to a
#     single variant id (a cheap gating run). Manual runs NEVER publish a
#     release — they exist to exercise the build.

on:
  workflow_dispatch:
    inputs:
      only:
        description: "Limit to one variant id for a gating run (linux-amd64-cpu | linux-amd64-vulkan | linux-amd64-cuda | linux-arm64-cpu | darwin-arm64-metal | windows-amd64). Empty = full matrix. Manual runs never publish a release."
        required: false
        default: ""
  push:
    branches:
      - main

# Avoid two merges racing to create the same tag.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write       # create tags and releases
  pull-requests: read   # read labels on the merged PR

env:
  SD_UPSTREAM: leejet/stable-diffusion.cpp
  # Windows CUDA toolkit version, installed via the Jimver action (pinned to a
  # recent release whose version map resolves current CUDA network packages).
  # 12.8+ covers the full Turing→Blackwell arch list (sm_100/sm_120). The Linux
  # CUDA build is independent (nvidia/cuda:13.0.0 devel container).
  CUDA_WINDOWS_VERSION: "12.9.1"
  # Turing→Blackwell. Pascal/Volta (sm_61/sm_70) are intentionally dropped.
  # Used by the Linux CUDA build (container, fast nvcc).
  CUDA_ARCHS: "75;80;86;89;90;100;120"
  # Windows nvcc on the 4-core runner is far slower than Linux, and building all
  # seven arches sequentially after the four CPU + Vulkan variants pushed the
  # Windows job past an hour. Trim Windows to SASS for the common desktop arches
  # (Ampere-consumer 86, Ada 89) plus full SASS+PTX for Blackwell-consumer 120 —
  # the PTX gives forward-compatible JIT for newer GPUs. Other arches (Turing,
  # Hopper/Blackwell-DC) are rare on Windows desktops; Linux keeps the full set.
  CUDA_ARCHS_WINDOWS: "86-real;89-real;120"
  # Shared base flags for every variant. Hidden visibility + static ggml is the
  # isolation mechanism; SD_API (default visibility) re-exports only sd_*.
  SD_BASE_FLAGS: >-
    -DCMAKE_BUILD_TYPE=Release
    -DSD_BUILD_SHARED_LIBS=ON
    -DSD_BUILD_SHARED_GGML_LIB=OFF
    -DSD_BUILD_EXAMPLES=OFF
    -DGGML_BACKEND_DL=OFF
    -DCMAKE_C_VISIBILITY_PRESET=hidden
    -DCMAKE_CXX_VISIBILITY_PRESET=hidden
    -DCMAKE_CUDA_VISIBILITY_PRESET=hidden
    -DCMAKE_VISIBILITY_INLINES_HIDDEN=ON

jobs:
  # Compute the version pin and resolve which jobs/matrix legs run for this
  # invocation (full matrix, or the single `only` variant for a gating run).
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}       # next semver, e.g. v0.1.2
      previous: ${{ steps.v.outputs.previous }}
      has_previous: ${{ steps.v.outputs.has_previous }}
      skip: ${{ steps.v.outputs.skip }}
      pin: ${{ steps.v.outputs.pin }}               # upstream pin (lib/version.txt)
      commit: ${{ steps.v.outputs.commit }}         # upstream short sha to clone
      linux_matrix: ${{ steps.m.outputs.linux_matrix }}
      run_linux: ${{ steps.m.outputs.run_linux }}
      run_cuda: ${{ steps.m.outputs.run_cuda }}
      run_macos: ${{ steps.m.outputs.run_macos }}
      run_windows: ${{ steps.m.outputs.run_windows }}
      run_full: ${{ steps.m.outputs.run_full }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0       # full history so existing tags are visible
          fetch-tags: true
      - id: v
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Upstream pin (selects WHAT we build) — unchanged role for lib/version.txt.
          pin="$(tr -d '[:space:]' < lib/version.txt)"
          commit="${pin##*-}"   # last dash-separated segment, e.g. 4ff2c8c
          echo "pin=$pin"       >> "$GITHUB_OUTPUT"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"
          echo "Building upstream $SD_UPSTREAM @ $commit (pin: $pin)"

          # Manual runs only ever test the build — never skip, never publish.
          if [ "${GITHUB_EVENT_NAME}" != "push" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Manual run: computing no version bump (release job won't fire)."
            exit 0
          fi

          # --- Next semver (ported from the former release.yml) ---
          # Match only strict vMAJOR.MINOR.PATCH tags; the git glob is too loose.
          latest="$(git tag -l --sort=-v:refname \
                      | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
          if [ -z "$latest" ]; then
            latest="v0.0.0"; has_previous="false"
            echo "No existing semver tag; starting from $latest"
          else
            has_previous="true"; echo "Latest tag: $latest"
          fi

          commit_msg="$(git log -1 --pretty=%B "${GITHUB_SHA}")"
          labels="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
                      --jq '.[].labels[].name' 2>/dev/null || true)"
          has() { printf '%s\n' "$1" | grep -qiF "$2"; }

          if has "$labels" "release:skip" || has "$commit_msg" "[skip release]" || has "$commit_msg" "#norelease"; then
            echo "Release skip requested; no build, no release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if has "$labels" "release:major" || has "$commit_msg" "#major"; then
            bump="major"
          elif has "$labels" "release:minor" || has "$commit_msg" "#minor"; then
            bump="minor"
          else
            bump="patch"
          fi
          echo "Bump level: $bump"

          ver="${latest#v}"; IFS='.' read -r major minor patch <<< "$ver"
          case "$bump" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          next="v${major}.${minor}.${patch}"
          if git rev-parse -q --verify "refs/tags/${next}" >/dev/null; then
            echo "Tag ${next} already exists; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Next version: $next"
          echo "skip=false"                  >> "$GITHUB_OUTPUT"
          echo "version=$next"               >> "$GITHUB_OUTPUT"
          echo "previous=$latest"            >> "$GITHUB_OUTPUT"
          echo "has_previous=$has_previous"  >> "$GITHUB_OUTPUT"
      - id: m
        env:
          ONLY: ${{ inputs.only }}
        run: |
          set -euo pipefail
          # Host-runner Linux legs (CUDA runs in its own container job).
          linux_all='[
            {"id":"linux-amd64-cpu","runner":"ubuntu-22.04","arch":"amd64","proc":"cpu","flags":"-DGGML_NATIVE=OFF -DGGML_AVX2=ON"},
            {"id":"linux-amd64-vulkan","runner":"ubuntu-22.04","arch":"amd64","proc":"vulkan","flags":"-DSD_VULKAN=ON -DGGML_NATIVE=OFF -DGGML_AVX2=ON"},
            {"id":"linux-arm64-cpu","runner":"ubuntu-22.04-arm","arch":"arm64","proc":"cpu","flags":"-DGGML_NATIVE=OFF"}
          ]'
          if [ -n "${ONLY}" ]; then
            linux_matrix="$(jq -c --arg only "$ONLY" '[.[] | select(.id==$only)]' <<<"$linux_all")"
          else
            linux_matrix="$(jq -c . <<<"$linux_all")"
          fi
          want() { [ -z "${ONLY}" ] || [ "${ONLY}" = "$1" ]; }
          echo "linux_matrix=$linux_matrix" >> "$GITHUB_OUTPUT"
          [ "$linux_matrix" != "[]" ] && echo "run_linux=true" >> "$GITHUB_OUTPUT" || echo "run_linux=false" >> "$GITHUB_OUTPUT"
          want linux-amd64-cuda  && echo "run_cuda=true"    >> "$GITHUB_OUTPUT" || echo "run_cuda=false"    >> "$GITHUB_OUTPUT"
          want darwin-arm64-metal && echo "run_macos=true"  >> "$GITHUB_OUTPUT" || echo "run_macos=false"  >> "$GITHUB_OUTPUT"
          want windows-amd64     && echo "run_windows=true" >> "$GITHUB_OUTPUT" || echo "run_windows=false" >> "$GITHUB_OUTPUT"
          [ -z "${ONLY}" ] && echo "run_full=true" >> "$GITHUB_OUTPUT" || echo "run_full=false" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Linux (host runners) — one self-contained .so per (arch, processor). The
  # binding's Unix loader opens a single libstable-diffusion.so from the lib dir
  # (no per-CPU subdir selection — that's Windows-only), so the Linux CPU build
  # targets an AVX2 baseline (ubiquitous on x86-64 servers); arm64 uses NEON.
  # ---------------------------------------------------------------------------
  linux:
    needs: setup
    if: ${{ needs.setup.outputs.run_linux == 'true' && needs.setup.outputs.skip != 'true' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.linux_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build tooling
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build git ca-certificates curl

      - name: Install Vulkan SDK
        if: matrix.proc == 'vulkan'
        run: |
          set -euo pipefail
          sudo apt-get install -y --no-install-recommends wget gnupg ca-certificates
          # The ggml Vulkan backend compiles shaders at build time with glslc,
          # which ships in the LunarG SDK (not in Ubuntu's libvulkan-dev). Pull
          # it from LunarG's apt repo (jammy = 22.04).
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc >/dev/null
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends vulkan-sdk

      - name: Clone upstream stable-diffusion.cpp @ pinned commit
        run: scripts/clone-upstream.sh "https://github.com/${SD_UPSTREAM}.git" "${{ needs.setup.outputs.commit }}" upstream

      - name: Configure & build
        working-directory: upstream
        run: |
          set -euo pipefail
          cmake -S . -B build -G Ninja $SD_BASE_FLAGS \
            -DCMAKE_CUDA_ARCHITECTURES="${CUDA_ARCHS}" \
            ${{ matrix.flags }}
          cmake --build build --config Release -j

      - name: Locate library
        id: lib
        run: |
          set -euo pipefail
          so="$(find upstream/build -name 'libstable-diffusion.so' -print -quit)"
          test -n "$so" || { echo "libstable-diffusion.so not found"; find upstream/build -name '*.so' | sed 's/^/  found: /'; exit 1; }
          echo "path=$so" >> "$GITHUB_OUTPUT"

      - name: Verify exported symbols (fail-closed)
        run: scripts/check-symbols.sh "${{ steps.lib.outputs.path }}" lib/expected-symbols.txt

      - name: Package archive
        run: |
          set -euo pipefail
          stage="stage"; mkdir -p "$stage"
          cp "${{ steps.lib.outputs.path }}" "$stage/"
          cp lib/stable-diffusion.cpp.txt lib/ggml.txt "$stage/" 2>/dev/null || true
          # Version-less name: the release TAG (vX.Y.Z) carries the version, so
          # the download URL is .../releases/download/<tag>/<this fixed name>.
          name="stable-diffusion-libs-linux-${{ matrix.arch }}-${{ matrix.proc }}.tar.gz"
          tar -C "$stage" -czf "$name" .
          echo "Packaged $name"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.id }}
          path: stable-diffusion-libs-*.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Linux CUDA — built inside the matching CUDA devel image so the toolkit is
  # present without a host install. Separate job (not a matrix leg) so no other
  # leg inherits an empty `container:`.
  # ---------------------------------------------------------------------------
  linux-cuda:
    needs: setup
    if: ${{ needs.setup.outputs.run_cuda == 'true' && needs.setup.outputs.skip != 'true' }}
    runs-on: ubuntu-22.04
    container: nvidia/cuda:13.0.0-devel-ubuntu22.04
    # Inside a container the default step shell is `sh` (dash), which lacks
    # `set -o pipefail`; force bash (present in the ubuntu-based CUDA image).
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Install build tooling
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build git ca-certificates curl
      - name: Clone upstream stable-diffusion.cpp @ pinned commit
        run: scripts/clone-upstream.sh "https://github.com/${SD_UPSTREAM}.git" "${{ needs.setup.outputs.commit }}" upstream
      - name: Configure & build
        working-directory: upstream
        run: |
          set -euo pipefail
          cmake -S . -B build -G Ninja $SD_BASE_FLAGS \
            -DSD_CUDA=ON -DGGML_NATIVE=OFF -DGGML_AVX2=ON \
            -DCMAKE_CUDA_ARCHITECTURES="${CUDA_ARCHS}"
          cmake --build build --config Release -j
      - name: Locate library
        id: lib
        run: |
          set -euo pipefail
          so="$(find upstream/build -name 'libstable-diffusion.so' -print -quit)"
          test -n "$so" || { echo "libstable-diffusion.so not found"; find upstream/build -name '*.so' | sed 's/^/  found: /'; exit 1; }
          echo "path=$so" >> "$GITHUB_OUTPUT"
      - name: Verify exported symbols (fail-closed)
        run: scripts/check-symbols.sh "${{ steps.lib.outputs.path }}" lib/expected-symbols.txt
      - name: Package archive
        run: |
          set -euo pipefail
          stage="stage"; mkdir -p "$stage"
          cp "${{ steps.lib.outputs.path }}" "$stage/"
          cp lib/stable-diffusion.cpp.txt lib/ggml.txt "$stage/" 2>/dev/null || true
          name="stable-diffusion-libs-linux-amd64-cuda.tar.gz"
          tar -C "$stage" -czf "$name" .
          echo "Packaged $name"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-cuda
          path: stable-diffusion-libs-*.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # macOS — Apple Silicon, Metal. Self-contained dylib (ggml static).
  # ---------------------------------------------------------------------------
  macos:
    needs: setup
    if: ${{ needs.setup.outputs.run_macos == 'true' && needs.setup.outputs.skip != 'true' }}
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install build tooling
        run: brew install cmake ninja
      - name: Clone upstream stable-diffusion.cpp @ pinned commit
        run: scripts/clone-upstream.sh "https://github.com/${SD_UPSTREAM}.git" "${{ needs.setup.outputs.commit }}" upstream
      - name: Configure & build
        working-directory: upstream
        run: |
          set -euo pipefail
          cmake -S . -B build -G Ninja $SD_BASE_FLAGS -DSD_METAL=ON
          cmake --build build --config Release -j
      - name: Locate library
        id: lib
        run: |
          set -euo pipefail
          dylib="$(find upstream/build -name 'libstable-diffusion.dylib' -print -quit)"
          test -n "$dylib" || { echo "libstable-diffusion.dylib not found"; find upstream/build -name '*.dylib' | sed 's/^/  found: /'; exit 1; }
          echo "path=$dylib" >> "$GITHUB_OUTPUT"
      - name: Verify exported symbols (fail-closed)
        run: scripts/check-symbols.sh "${{ steps.lib.outputs.path }}" lib/expected-symbols.txt
      - name: Package archive
        run: |
          set -euo pipefail
          stage="stage"; mkdir -p "$stage"
          cp "${{ steps.lib.outputs.path }}" "$stage/"
          cp lib/stable-diffusion.cpp.txt lib/ggml.txt "$stage/" 2>/dev/null || true
          name="stable-diffusion-libs-darwin-arm64-metal.tar.gz"
          tar -C "$stage" -czf "$name" .
          echo "Packaged $name"
      - uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64-metal
          path: stable-diffusion-libs-*.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows — the binding selects a per-variant SUBDIR within the lib dir
  # (avx512/ avx2/ avx/ noavx/ for CPU, cuda12/ vulkan/ for GPU; see
  # windowsLibCandidates in pkg/sd/load.go). Each variant builds as its own
  # matrix leg in parallel (installing only the toolchain it needs); the
  # windows_assemble job then merges them into ONE archive carrying that subdir
  # tree, so a single lib dir satisfies any host.
  # ---------------------------------------------------------------------------
  windows:
    needs: setup
    if: ${{ needs.setup.outputs.run_windows == 'true' && needs.setup.outputs.skip != 'true' }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { subdir: avx2, kind: cpu, flags: "-DGGML_NATIVE=OFF -DGGML_AVX2=ON" }
          - { subdir: avx512, kind: cpu, flags: "-DGGML_NATIVE=OFF -DGGML_AVX512=ON -DGGML_AVX=ON -DGGML_AVX2=ON" }
          - { subdir: avx, kind: cpu, flags: "-DGGML_NATIVE=OFF -DGGML_AVX=ON -DGGML_AVX2=OFF" }
          - { subdir: noavx, kind: cpu, flags: "-DGGML_NATIVE=OFF -DGGML_AVX=OFF -DGGML_AVX2=OFF -DGGML_FMA=OFF" }
          - { subdir: vulkan, kind: vulkan, flags: "-DSD_VULKAN=ON -DGGML_NATIVE=OFF -DGGML_AVX2=ON" }
          - { subdir: cuda12, kind: cuda, flags: "-DSD_CUDA=ON -DGGML_NATIVE=OFF -DGGML_AVX2=ON" }
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Install Vulkan SDK
        if: matrix.kind == 'vulkan'
        run: |
          $ErrorActionPreference = "Stop"
          # Resolve the latest published Windows SDK version rather than pinning a
          # string that may not exist for Windows (a hardcoded version 404s).
          $ver = (Invoke-WebRequest -Uri "https://vulkan.lunarg.com/sdk/latest/windows.txt").Content.Trim()
          Write-Host "Latest Vulkan SDK for Windows: $ver"
          # LunarG's Windows installer is named vulkansdk-windows-X64-<ver>.exe
          # (the old VulkanSDK-<ver>-Installer.exe name 404s).
          $url = "https://sdk.lunarg.com/sdk/download/$ver/windows/vulkansdk-windows-X64-$ver.exe"
          Invoke-WebRequest -Uri $url -OutFile vulkan-installer.exe
          Start-Process -FilePath .\vulkan-installer.exe -ArgumentList "--accept-licenses","--default-answer","--confirm-command","install" -Wait
          "VULKAN_SDK=C:\VulkanSDK\$ver" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install CUDA toolkit
        if: matrix.kind == 'cuda'
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: ${{ env.CUDA_WINDOWS_VERSION }}
          method: network
          # The action validates a non-existent cache path on network installs
          # and aborts with "Path Validation Error" unless caching is disabled.
          use-github-cache: false
          use-local-cache: false
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "cuda_profiler_api"]'

      - name: Clone upstream stable-diffusion.cpp @ pinned commit
        run: |
          $ErrorActionPreference = "Stop"
          bash scripts/clone-upstream.sh "https://github.com/$env:SD_UPSTREAM.git" "${{ needs.setup.outputs.commit }}" upstream

      - name: Build variant (${{ matrix.subdir }})
        run: |
          $ErrorActionPreference = "Stop"
          $base = $env:SD_BASE_FLAGS -replace "`n"," "
          $bdir = "upstream/build"
          # -DCMAKE_CUDA_ARCHITECTURES is harmless for the non-CUDA legs.
          $cfg = "cmake -S upstream -B $bdir -G Ninja $base -DCMAKE_CUDA_ARCHITECTURES=`"$env:CUDA_ARCHS_WINDOWS`" ${{ matrix.flags }}"
          Write-Host $cfg
          iex $cfg
          cmake --build $bdir --config Release -j
          $dll = Get-ChildItem -Path $bdir -Recurse -Filter "stable-diffusion.dll" | Select-Object -First 1
          if (-not $dll) { throw "stable-diffusion.dll not found for ${{ matrix.subdir }}" }
          New-Item -ItemType Directory -Force -Path "stage/${{ matrix.subdir }}" | Out-Null
          Copy-Item $dll.FullName "stage/${{ matrix.subdir }}/"

      # Each leg uploads only its own subdir/stable-diffusion.dll; the
      # windows_assemble job merges them into the final subdir-tree archive.
      - uses: actions/upload-artifact@v4
        with:
          name: winpart-${{ matrix.subdir }}
          path: stage
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows assemble — gather the per-variant DLLs built in parallel above into
  # the single archive carrying the subdir tree the binding's windowsLibCandidates
  # resolves, run the fail-closed symbol gate over all of them, and package it.
  # ---------------------------------------------------------------------------
  windows_assemble:
    needs: [setup, windows]
    if: ${{ needs.setup.outputs.run_windows == 'true' && needs.setup.outputs.skip != 'true' }}
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1 # provides dumpbin for the symbol gate

      - uses: actions/download-artifact@v4
        with:
          pattern: winpart-*
          path: stage
          merge-multiple: true

      - name: Verify exported symbols (fail-closed)
        run: |
          $ErrorActionPreference = "Stop"
          $expected = Get-Content lib/expected-symbols.txt | Where-Object { $_.Trim() -ne "" } | ForEach-Object { $_.Trim() }
          $dlls = Get-ChildItem -Path stage -Recurse -Filter "stable-diffusion.dll"
          if ($dlls.Count -lt 6) { throw "expected 6 Windows variant DLLs, found $($dlls.Count)" }
          $fail = $false
          $dlls | ForEach-Object {
            $dll = $_.FullName
            Write-Host "Checking $dll"
            $dump = & dumpbin /EXPORTS $dll
            $exports = $dump | Select-String -Pattern '^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+(\S+)' | ForEach-Object { $_.Matches[0].Groups[1].Value }
            foreach ($sym in $expected) {
              if ($exports -notcontains $sym) { Write-Host "MISSING export: $sym in $dll"; $fail = $true }
            }
            $leaked = $exports | Where-Object { $_ -like 'ggml_*' }
            if ($leaked) { Write-Host "LEAKED ggml symbols in ${dll}:"; $leaked | ForEach-Object { Write-Host "  $_" }; $fail = $true }
          }
          if ($fail) { throw "Windows symbol verification FAILED" }
          Write-Host "Windows symbol verification OK ($($dlls.Count) variants)"

      - name: Package archive
        run: |
          $ErrorActionPreference = "Stop"
          Copy-Item lib/stable-diffusion.cpp.txt,lib/ggml.txt stage/ -ErrorAction SilentlyContinue
          $name = "stable-diffusion-libs-windows-amd64.tar.gz"
          tar -C stage -czf $name .
          Write-Host "Packaged $name"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: stable-diffusion-libs-*.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Release — gather every archive, write checksums, and publish the single
  # vX.Y.Z release carrying the binding's tag (so `go get ...@vX.Y.Z` resolves)
  # AND the lib archives + checksums as assets. Only on a real merge to main
  # (never on a manual dispatch), only for a full build, only when not skipped,
  # and only when every build job succeeded. Idempotent: a re-run refreshes the
  # assets on the existing release in place.
  # ---------------------------------------------------------------------------
  release:
    needs: [setup, linux, linux-cuda, macos, windows_assemble]
    if: >-
      ${{ always() && github.event_name == 'push'
          && needs.setup.outputs.run_full == 'true'
          && needs.setup.outputs.skip != 'true'
          && needs.linux.result == 'success'
          && needs.linux-cuda.result == 'success'
          && needs.macos.result == 'success'
          && needs.windows_assemble.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        working-directory: dist
        run: |
          set -euo pipefail
          ls -la
          sha256sum stable-diffusion-libs-*.tar.gz > checksums.txt
          cat checksums.txt
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.setup.outputs.version }}
          PREVIOUS: ${{ needs.setup.outputs.previous }}
          HAS_PREVIOUS: ${{ needs.setup.outputs.has_previous }}
          PIN: ${{ needs.setup.outputs.pin }}
          COMMIT: ${{ needs.setup.outputs.commit }}
        run: |
          set -euo pipefail
          notes="$(cat <<EOF
          stable-diffusion-go ${VERSION} — pure-Go binding + prebuilt native libraries.

          Built from ${SD_UPSTREAM} @ ${COMMIT} (upstream pin: ${PIN}).

          \`go get github.com/Pendra-Cloud/stable-diffusion-go@${VERSION}\` for the
          binding; the lib archives attached here match this exact tag. Each archive
          contains a self-contained libstable-diffusion (ggml statically linked,
          hidden visibility — exports only the sd_* symbols pkg/sd/load.go registers).

          CUDA archives require a matching host CUDA runtime; Vulkan archives require
          a Vulkan loader/ICD on the host. The Windows archive carries the per-CPU/GPU
          (avx2/avx512/avx/noavx/vulkan/cuda12) subdir tree the binding selects from.
          EOF
          )"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" dist/stable-diffusion-libs-*.tar.gz dist/checksums.txt --clobber
          else
            # Creates the vX.Y.Z tag at the merge commit — this is the automatic
            # tagging step; --generate-notes appends the commit/PR changelog.
            args=(--target "$GITHUB_SHA" --title "$VERSION" --notes "$notes" --generate-notes)
            [ "$HAS_PREVIOUS" = "true" ] && args+=(--notes-start-tag "$PREVIOUS")
            gh release create "$VERSION" dist/stable-diffusion-libs-*.tar.gz dist/checksums.txt "${args[@]}"
          fi
